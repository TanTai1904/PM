name: journal_trend_analyzer
description: "A Flutter app to search and analyze research publication trends from OpenAlex API."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Open DOI links in browser
  url_launcher: ^6.3.0

  # Loading skeleton
  shimmer: ^3.0.0

  # Number formatting
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
